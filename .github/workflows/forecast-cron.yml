name: Hourly Forecast Update

on:
  schedule:
    - cron: "5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-forecast:
    if: ${{ github.event_name == 'workflow_dispatch' || vars.ENABLE_FORECAST_CRON == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node deps
        run: npm ci

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Restore live inference artifacts
        env:
          LIVE_MODEL_URL: ${{ secrets.LIVE_MODEL_URL }}
          LIVE_FEATURE_TABLE_URL: ${{ secrets.LIVE_FEATURE_TABLE_URL }}
          LIVE_PATTERN_CACHE_URL: ${{ secrets.LIVE_PATTERN_CACHE_URL }}
          LIVE_HOLIDAYS_URL: ${{ secrets.LIVE_HOLIDAYS_URL }}
          TRAFFIC_MODEL_URL: ${{ secrets.TRAFFIC_MODEL_URL }}
          TRAFFIC_PATTERN_CACHE_URL: ${{ secrets.TRAFFIC_PATTERN_CACHE_URL }}
        run: |
          set -euo pipefail
          mkdir -p data/processed/model_live_compatible data/processed/model_traffic_forecast data/processed/features data/processed/calendar

          if [ -n "${LIVE_MODEL_URL:-}" ]; then
            curl -fsSL "$LIVE_MODEL_URL" -o data/processed/model_live_compatible/dong_demand_proxy_model.joblib
          fi

          if [ -n "${LIVE_FEATURE_TABLE_URL:-}" ]; then
            curl -fsSL "$LIVE_FEATURE_TABLE_URL" -o data/processed/features/dong_hour_features_v2_2023-01_2025-12.csv
          fi

          if [ -n "${LIVE_PATTERN_CACHE_URL:-}" ]; then
            curl -fsSL "$LIVE_PATTERN_CACHE_URL" -o data/processed/model_live_compatible/pattern_cache.json
          fi

          if [ -n "${LIVE_HOLIDAYS_URL:-}" ]; then
            curl -fsSL "$LIVE_HOLIDAYS_URL" -o data/processed/calendar/korean_public_holidays_2023_2026.csv
          fi

          if [ -n "${TRAFFIC_MODEL_URL:-}" ]; then
            curl -fsSL "$TRAFFIC_MODEL_URL" -o data/processed/model_traffic_forecast/traffic_forecast_model.joblib
          fi

          if [ -n "${TRAFFIC_PATTERN_CACHE_URL:-}" ]; then
            curl -fsSL "$TRAFFIC_PATTERN_CACHE_URL" -o data/processed/model_traffic_forecast/traffic_pattern_cache.json
          fi

      - name: Check live inference artifacts
        run: |
          set -euo pipefail
          test -f data/processed/model_live_compatible/dong_demand_proxy_model.joblib
          test -f data/processed/features/dong_hour_features_v2_2023-01_2025-12.csv || test -f data/processed/model_live_compatible/pattern_cache.json
          test -f data/processed/model_traffic_forecast/traffic_forecast_model.joblib
          test -f data/processed/model_traffic_forecast/traffic_pattern_cache.json

      - name: Run live demand cycle
        env:
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
          KMA_API_KEY: ${{ secrets.KMA_API_KEY }}
          SEOUL_OPEN_API_KEY: ${{ secrets.SEOUL_OPEN_API_KEY }}
        run: node scripts/run-live-demand-cycle.mjs

      - name: Persist generated forecast artifacts
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f \
            public/forecast/latest.json \
            public/dispatch-plan.json \
            public/data-summary.json \
            public/feature-snapshot.json \
            public/traffic-snapshot.json \
            public/live-forecast-comparison.json \
            public/traffic-forecast/latest.json \
            public/traffic-forecast-comparison.json \
            public/taxi-pressure/latest.json \
            public/taxi-pressure-comparison.json \
            public/public-pressure-baseline-comparison.json \
            public/poi-features.json \
            public/poi-forecast-comparison.json \
            public/population-pressure-summary.json \
            public/demand-guardrail-summary.json \
            public/model-observability.json \
            public/overnight-status.json \
            docs/overnight-model-qa-status.md \
            data/processed/features/latest.json \
            data/processed/live_validation/latest.json \
            data/processed/live_validation/live_forecast_log.jsonl \
            data/processed/live_validation/live_forecast_comparison.json \
            data/processed/live_validation/traffic_forecast_log.jsonl \
            data/processed/live_validation/traffic_forecast_comparison.json \
            data/processed/live_validation/taxi_pressure_log.jsonl \
            data/processed/live_validation/taxi_pressure_comparison.json \
            data/processed/live_validation/public_pressure_baseline_comparison.json \
            data/processed/live_validation/poi_forecast_comparison.json \
            data/processed/live_validation/population_pressure_summary.json \
            data/processed/live_validation/demand_guardrail_summary.json \
            data/processed/traffic/citydata_dong_traffic_latest.json
          if git diff --cached --quiet; then
            echo "No generated forecast changes to persist."
          else
            git commit -m "Update live forecast artifacts [skip ci]"
            git push
          fi

      - name: Build Next.js app
        run: npm run build

      - name: Build Cloudflare bundle
        run: ./node_modules/.bin/opennextjs-cloudflare build

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: ./node_modules/.bin/wrangler deploy
