<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="100%" height="100%" fill="#FBFCFE"/>
  <style>
    text { font-family: 'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',Arial,sans-serif; fill: #203040; }
    .title { font-size: 42px; font-weight: 800; }
    .subtitle { font-size: 22px; fill: #6B7280; }
    .axis { font-size: 18px; fill: #6B7280; }
    .small { font-size: 17px; fill: #6B7280; }
    .label { font-size: 22px; font-weight: 700; }
    .value { font-size: 22px; font-weight: 800; }
  </style>
  <text class="title" x="80" y="86">오늘 학습한 모델 결과 요약</text>
  <text class="subtitle" x="80" y="126">택시 proxy 모델과 실제 대중교통 승차량 모델을 분리해서 해석</text>
  <rect x="100" y="210" width="650" height="470" rx="20" fill="white" stroke="#D9E1EC" stroke-width="2"/><rect x="100" y="210" width="650" height="16" rx="8" fill="#2F80ED"/><text x="142" y="285" font-size="30" font-weight="800">택시 수요 proxy 모델</text><text x="142" y="355" font-size="21" fill="#6B7280">예측 대상</text><text x="142" y="409" font-size="38" font-weight="800" fill="#2F80ED">다음 1시간 수요 점수</text><text x="142" y="447" font-size="18" fill="#6B7280">생활인구/날씨/요일/교통 등으로 만든 0~1 proxy</text><text x="142" y="505" font-size="21" fill="#6B7280">Test MAE / R²</text><text x="142" y="559" font-size="38" font-weight="800" fill="#2F80ED">0.0062 / 0.9976</text><text x="142" y="597" font-size="18" fill="#6B7280">실제 호출량이 아니라 proxy 점수 기준 성능</text><rect x="850" y="210" width="650" height="470" rx="20" fill="white" stroke="#D9E1EC" stroke-width="2"/><rect x="850" y="210" width="650" height="16" rx="8" fill="#1B998B"/><text x="892" y="285" font-size="30" font-weight="800">대중교통 승차량 모델</text><text x="892" y="355" font-size="21" fill="#6B7280">예측 대상</text><text x="892" y="409" font-size="38" font-weight="800" fill="#1B998B">다음 1시간 승차 인원</text><text x="892" y="447" font-size="18" fill="#6B7280">서울 열린데이터 기반 실제 승차량</text><text x="892" y="505" font-size="21" fill="#6B7280">Test MAE / R²</text><text x="892" y="559" font-size="38" font-weight="800" fill="#1B998B">116명 / 0.9969</text><text x="892" y="597" font-size="18" fill="#6B7280">행정동-시간 단위 평균 오차</text><rect x="250" y="735" width="1100" height="76" rx="16" fill="#F4F7FA" stroke="#D9E1EC"/><text x="800" y="782" text-anchor="middle" font-size="23" font-weight="800">결론: 공개 데이터 기반으로 지역별 근미래 이동 수요를 예측하는 프로토타입 구축</text>
</svg>