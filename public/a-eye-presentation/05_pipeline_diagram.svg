  <text class="title" x="80" y="86">A-Eye 수요 예측 파이프라인</text>
  <text class="subtitle" x="80" y="126">데이터 수집부터 Colab 학습, 지도 연동 가능한 JSON 출력까지</text>
  <rect x="100" y="310" width="250" height="140" rx="18" fill="white" stroke="#D9E1EC" stroke-width="2"/><text x="225" y="362" text-anchor="middle" font-size="27" font-weight="800">공개 데이터</text><text x="225" y="402" text-anchor="middle" font-size="19" fill="#6B7280">생활인구 / 날씨</text><text x="225" y="432" text-anchor="middle" font-size="19" fill="#6B7280">공휴일 / 대중교통</text><rect x="460" y="310" width="250" height="140" rx="18" fill="white" stroke="#D9E1EC" stroke-width="2"/><text x="585" y="362" text-anchor="middle" font-size="27" font-weight="800">Feature 생성</text><text x="585" y="402" text-anchor="middle" font-size="19" fill="#6B7280">행정동 x 날짜 x 시간</text><text x="585" y="432" text-anchor="middle" font-size="19" fill="#6B7280">수요 영향 변수</text><rect x="820" y="310" width="250" height="140" rx="18" fill="white" stroke="#D9E1EC" stroke-width="2"/><text x="945" y="362" text-anchor="middle" font-size="27" font-weight="800">Colab 학습</text><text x="945" y="402" text-anchor="middle" font-size="19" fill="#6B7280">택시 proxy 모델</text><text x="945" y="432" text-anchor="middle" font-size="19" fill="#6B7280">대중교통 모델</text><rect x="1180" y="310" width="280" height="140" rx="18" fill="white" stroke="#D9E1EC" stroke-width="2"/><text x="1320" y="362" text-anchor="middle" font-size="27" font-weight="800">예측 결과</text><text x="1320" y="402" text-anchor="middle" font-size="19" fill="#6B7280">지역별 점수</text><text x="1320" y="432" text-anchor="middle" font-size="19" fill="#6B7280">지도 연동 JSON</text><line x1="376" y1="380" x2="434" y2="380" stroke="#2F80ED" stroke-width="5" stroke-linecap="round"/><polygon points="434,380 416,370 416,390" fill="#2F80ED"/><line x1="736" y1="380" x2="794" y2="380" stroke="#2F80ED" stroke-width="5" stroke-linecap="round"/><polygon points="794,380 776,370 776,390" fill="#2F80ED"/><line x1="1096" y1="380" x2="1154" y2="380" stroke="#2F80ED" stroke-width="5" stroke-linecap="round"/><polygon points="1154,380 1136,370 1136,390" fill="#2F80ED"/><rect x="210" y="595" width="1180" height="104" rx="20" fill="#F4F7FA" stroke="#D9E1EC"/><text x="800" y="642" text-anchor="middle" font-size="25" font-weight="800">최종 활용: 지도에서 행정동별 색상/점수 표시, 수요 높은 지역 추천</text><text x="800" y="676" text-anchor="middle" font-size="19" fill="#6B7280">주의: 현재 택시 모델은 실제 호출량이 아니라 공개 데이터 기반 proxy</text>
