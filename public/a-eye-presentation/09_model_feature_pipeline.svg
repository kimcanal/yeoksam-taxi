  <rect class="bg" x="0" y="0" width="1280" height="780"/>
  <text class="title" x="48" y="58">모델이 무엇을 보고 예측했는가</text>
  <text class="subtitle" x="48" y="88">대중교통 실측 수요와 공공 날씨/휴일 feature를 결합한 근미래 수요 예측 구조</text>
  <rect class="panel" x="70" y="170" width="205" height="142" rx="14"/>
