<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="780" viewBox="0 0 1280 780">
  <defs>
    <style>
      .bg{fill:#f5f7fb}.panel{fill:#fff;stroke:#d8e1ec;stroke-width:1.2}.title{font:800 34px 'Malgun Gothic','Apple SD Gothic Neo',Arial,sans-serif;fill:#1f2937}.subtitle{font:500 17px 'Malgun Gothic','Apple SD Gothic Neo',Arial,sans-serif;fill:#687386}.label{font:700 15px 'Malgun Gothic','Apple SD Gothic Neo',Arial,sans-serif;fill:#687386}.text{font:600 16px 'Malgun Gothic','Apple SD Gothic Neo',Arial,sans-serif;fill:#263244}.small{font:500 13px 'Malgun Gothic','Apple SD Gothic Neo',Arial,sans-serif;fill:#687386}.num{font:850 30px 'Malgun Gothic','Apple SD Gothic Neo',Arial,sans-serif;fill:#1f2937}.axis{font:500 12px 'Malgun Gothic','Apple SD Gothic Neo',Arial,sans-serif;fill:#687386}.grid{stroke:#e5ecf5;stroke-width:1}.blue{fill:#2f80ed}.green{fill:#17856b}.red{fill:#d94b3d}.amber{fill:#b15f00}.line-blue{fill:none;stroke:#2f80ed;stroke-width:4}.line-red{fill:none;stroke:#d94b3d;stroke-width:3.5;stroke-dasharray:8 6}.line-green{fill:none;stroke:#17856b;stroke-width:3}
    </style>
