        <div xmlns="http://www.w3.org/1999/xhtml" style="font:600 14px 'Malgun Gothic',Arial,sans-serif;color:#263244;line-height:1.38">hour, weekday, weekend</div>
      </foreignObject>
<rect class="panel" x="308" y="170" width="205" height="142" rx="14"/>
      <text class="label" x="326" y="204">지역</text>
      <foreignObject x="326" y="224" width="170" height="70">
        <div xmlns="http://www.w3.org/1999/xhtml" style="font:600 14px 'Malgun Gothic',Arial,sans-serif;color:#263244;line-height:1.38">dong_name</div>
      </foreignObject>
<rect class="panel" x="546" y="170" width="205" height="142" rx="14"/>
      <text class="label" x="564" y="204">수요 lag</text>
      <foreignObject x="564" y="224" width="170" height="70">
        <div xmlns="http://www.w3.org/1999/xhtml" style="font:600 14px 'Malgun Gothic',Arial,sans-serif;color:#263244;line-height:1.38">현재, 1시간 전, 전날 같은 시간, 전주 같은 시간</div>
      </foreignObject>
<rect class="panel" x="784" y="170" width="205" height="142" rx="14"/>
      <text class="label" x="802" y="204">날씨</text>
