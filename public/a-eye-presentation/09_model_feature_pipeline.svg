    <rect class="panel" x="122" y="400" width="1036" height="150" rx="16"/>
    <text class="label" x="166" y="438">모델</text>
    <text class="num" x="166" y="486">HistGradientBoostingRegressor</text>
    <text class="text" x="166" y="526">Target: target_transit_boardings_t_plus_1h · Rows: 153,783 · Dates: 712일</text>
    <path d="M640 312 L640 392" stroke="#94a3b8" stroke-width="3"/><path d="M640 392 l-8 -10 h16 z" fill="#94a3b8"/>
    <text class="small" x="166" y="606">예측 의미: 동·요일·시간·날씨·휴일 조건에서 다음 1시간 승차량을 예측합니다.</text>
    <text class="small" x="166" y="634">실제 택시 호출량이 아니라, 공개 대중교통 수요를 활용한 이동 수요 proxy입니다.</text>
</svg>
